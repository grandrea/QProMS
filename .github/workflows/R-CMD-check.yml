name: R-CMD-check

on:
  push:
    branches: [ 29-versione-standalone-shiny-exe-oppure-r-package ]
  pull_request:
    branches: [ 29-versione-standalone-shiny-exe-oppure-r-package ]

permissions:
  contents: read

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
      - name: Setup system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglpk40 libglpk-dev libmagick++-dev imagemagick
      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check
      - name: Check package
        uses: r-lib/actions/check-r-package@v2

